<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Integration Test - Echo Marketplace</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">

<h2>Echo Backend Engine Test - Post a Listing</h2>

<input type="text" id="listing-title" placeholder="Item Name (e.g., Used Calculus Book)" style="padding: 5px; width: 250px;">
<br><br>
<input type="number" id="listing-price" placeholder="Price (e.g., 50)" style="padding: 5px; width: 250px;">
<br><br>
<button id="btn-submit-listing" style="padding: 8px 15px; cursor: pointer;">Force Write to Cloud</button>

<hr style="margin: 30px 0;">

<h2>Echo Marketplace - Latest Feed</h2>

<div id="marketplace-feed" style="display: flex; gap: 20px; flex-wrap: wrap;">
    <p>Loading cloud data...</p>
</div>

<script type="module" src="test.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
