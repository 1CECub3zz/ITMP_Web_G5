<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Integration Test - Echo Marketplace</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">

<div style="background-color: #e2f0d9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
    <strong>🔐 Dev Auth Session Simulator: </strong>
    <button id="btn-mock-login" style="padding: 5px 10px; cursor: pointer; margin-left: 10px; background-color: #2e74b5; color: white; border: none; border-radius: 4px;">Simulate Login (Bernard)</button>
    <button id="btn-mock-logout" style="padding: 5px 10px; cursor: pointer; margin-left: 10px; background-color: #c00000; color: white; border: none; border-radius: 4px;">Simulate Logout</button>
    <p id="auth-status-text" style="margin: 10px 0 0 0; font-size: 0.9em; color: #555;">Session Status: Checking authentication...</p>
</div>

<h2>Echo Backend Engine Test - Post a Listing</h2>

<input type="text" id="listing-title" placeholder="Item Name (e.g., Used Calculus Book)" style="padding: 5px; width: 250px;">
<br><br>
<input type="number" id="listing-price" placeholder="Price (e.g., 50)" style="padding: 5px; width: 250px;">
<br><br>
<button id="btn-submit-listing" style="padding: 8px 15px; cursor: pointer;">Force Write to Cloud</button>

<hr style="margin: 30px 0;">

<h2>Echo Marketplace - Latest Feed</h2>

<div style="margin-bottom: 20px; background-color: #f1f1f1; padding: 10px; border-radius: 8px;">
    <strong>Filter by Category: </strong>
    <button id="filter-all" style="margin-right: 10px; cursor: pointer; padding: 5px 10px;">🌍 All Items</button>
    <button id="filter-books" style="margin-right: 10px; cursor: pointer; padding: 5px 10px;">📚 Books</button>
    <button id="filter-electronics" style="margin-right: 10px; cursor: pointer; padding: 5px 10px;">💻 Electronics</button>
</div>

<div id="marketplace-feed" style="display: flex; gap: 20px; flex-wrap: wrap;">
    <p>Loading cloud data...</p>
</div>

<script type="module" src="test.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
