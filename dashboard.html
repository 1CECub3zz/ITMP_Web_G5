<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Echo Brews</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #fafafa; margin: 0; padding: 20px;">
<div style="max-width: 800px; margin: 0 auto;">
    <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
        <h2 style="color: #3e2723; margin: 0;">Echo Dashboard</h2>
        <button id="btn-logout" style="background-color: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">Sign Out</button>
    </header>

    <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px;">
        <p style="margin-top: 0; color: #666;">Welcome back, Brewer.</p>
        <p style="font-family: monospace; color: #1976d2; background: #e3f2fd; padding: 10px; border-radius: 4px;">UID: <span id="display-user-uid">Loading...</span></p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <button id="nav-add-brew" style="padding: 20px; font-size: 18px; cursor: pointer; border: 2px solid #4e342e; background: #4e342e; color: white; border-radius: 8px; transition: 0.3s;">
            ➕ Log a New Brew
        </button>
        <button id="nav-records" style="padding: 20px; font-size: 18px; cursor: pointer; border: 2px solid #1976d2; background: white; color: #1976d2; border-radius: 8px; transition: 0.3s;">
            📚 View My Records
        </button>
    </div>
</div>
<script type="module" src="controller-dashboard.js"></script>
</body>
</html>
